<VirtualHost *:80>
    ServerName 192.168.56.101
    DocumentRoot /var/www/hotel-laravel/public

    <Directory /var/www/hotel-laravel/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/hotel-laravel-error.log
    CustomLog ${APACHE_LOG_DIR}/hotel-laravel-access.log combined
</VirtualHost>
